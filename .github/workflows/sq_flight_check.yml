name: SQ Flight Checker - BOM to SFO

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run flight checker
        env:
          SIA_API_KEY:         ${{ secrets.SIA_API_KEY }}
          SIA_API_SECRET:      ${{ secrets.SIA_API_SECRET }}
          ALERT_EMAIL_TO:      ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM:    ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_APP_PWD: ${{ secrets.ALERT_EMAIL_APP_PWD }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
